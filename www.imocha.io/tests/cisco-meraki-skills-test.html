<script>
document.addEventListener("DOMContentLoaded", function () {
  var answers = document.querySelectorAll(".faq_content");

  answers.forEach(function (el) {

    // Prevent double processing
    if (el.dataset.processed === "true") return;

    var raw = el.textContent || "";
    raw = raw.trim();
    if (!raw) return;

    // If no bullet markers exist, do nothing
    if (!raw.includes("•") && !/\d+\.\s/.test(raw)) return;

    // Escape HTML safely
    function escapeHTML(str) {
      var div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    var html = "";
    var introText = raw;

    // ---- HANDLE DOT BULLETS ----
    if (raw.includes("•")) {
      var firstBulletIndex = raw.indexOf("•");
      introText = raw.slice(0, firstBulletIndex).trim();
      var bulletParts = raw.slice(firstBulletIndex)
        .split("•")
        .map(function (p) { return p.trim(); })
        .filter(Boolean);

      if (introText) {
        html += "<p>" + escapeHTML(introText) + "</p>";
      }

      html += "<ul>";
      bulletParts.forEach(function (item) {
        html += "<li>" + escapeHTML(item) + "</li>";
      });
      html += "</ul>";
    }

    // ---- HANDLE NUMBERED LISTS ----
    else if (/\d+\.\s/.test(raw)) {
      var parts = raw.split(/(\d+\.\s)/).filter(Boolean);

      var items = [];
      var intro = "";

      for (var i = 0; i < parts.length; i++) {
        if (/^\d+\.\s$/.test(parts[i]) && parts[i+1]) {
          items.push(parts[i+1].trim());
          i++;
        } else {
          intro += parts[i];
        }
      }

      intro = intro.trim();

      if (intro) {
        html += "<p>" + escapeHTML(intro) + "</p>";
      }

      html += "<ol>";
      items.forEach(function (item) {
        html += "<li>" + escapeHTML(item) + "</li>";
      });
      html += "</ol>";
    }

    if (!html) return;

    el.innerHTML = html;

    // Mark as processed
    el.dataset.processed = "true";
  });
});
</script>
