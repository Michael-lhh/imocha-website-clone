<!-- Include Splide library -->
<script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@latest/dist/js/splide.min.js"></script>
<!-- Include Splide AutoScroll extension -->
<script src="https://cdn.jsdelivr.net/npm/@splidejs/splide-extension-auto-scroll@0.5.3/dist/js/splide-extension-auto-scroll.min.js"></script>


<script>
  document.addEventListener("DOMContentLoaded", function () {
    const splide = new Splide(".splide", {
      type: "loop",
      autoWidth: true,
      height: "auto",
      drag: "free",
      arrows: false,
      pagination: false,
      label: "Image Slider",
      reduceMotion: {
        speed: 0,
        rewindSpeed: 0,
        autoplay: "pause",
      },
      autoScroll: {
        speed: 0.5,
        pauseOnHover: false,
      },
      dragSpeed: 0.5, // Slow down the drag speed
      breakpoints: {
        992: {
          autoScroll: {
            speed: 0.7, // Adjust speed for screens below 992px
          },
          perPage: 2, // Number of slides visible for screens below 992px and above 768px
        },
        768: {
          autoScroll: false, // Disable auto scroll for screens below 768px
          perPage: 1, // Number of slides visible for screens between 992px and 768px
        },
        320: {
          autoScroll: false, // Disable auto scroll for screens below 768px
          perPage: 1, // Number of slides visible for screens below 768px and above 320px
        },
      },
    });

    const section = document.querySelector(".splide");

    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            // Make sure the .splide element is visible with the transition effect
            section.classList.add("visible");

            // Delay enabling autoScroll to make the transition smooth
            setTimeout(() => {
              splide.options.autoScroll = { speed: 0.5 }; // Enable autoScroll
              splide.mount(window.splide.Extensions); // Ensure the Splide instance is initialized
            }, 500); // Delay to match the fade-in duration
          } else {
            splide.options.autoScroll = false; // Disable autoScroll when not visible
            section.classList.remove("visible");
          }
        });
      },
      { threshold: 0.3 } // Adjust threshold as needed
    );

    observer.observe(section);
  });
</script></body></html>
