<script>
(function () {
  function onReady(fn){ 
    if (document.readyState !== 'loading') fn(); 
    else document.addEventListener('DOMContentLoaded', fn);
  }

  function whenTabsReady(cb){
    var tries = 0, t = setInterval(function(){
      if (document.querySelector('.w-tab-link[data-w-tab]') || tries++ > 100) {
        clearInterval(t); cb();
      }
    }, 50);
  }

  function activateFromHash(){
    var key = decodeURIComponent((location.hash || '').slice(1)).trim();
    if (!key) return;

    // match the updated key exactly
    var btn = document.querySelector('[data-w-tab="' + key + '"]') ||
              document.querySelector('.w-tabs [data-w-tab="' + key + '"]');

    if (btn && !btn.classList.contains('w--current')) btn.click();
  }

  onReady(function(){
    whenTabsReady(function(){
      activateFromHash();
      window.addEventListener('hashchange', activateFromHash);
    });
  });
})();
</script>
<script>
document.addEventListener("DOMContentLoaded", function () {
  const hash = window.location.hash;
  if (!hash) return;

  const tabButton = document.querySelector(hash);
  if (tabButton) {
    tabButton.click();
  }
});
</script>
