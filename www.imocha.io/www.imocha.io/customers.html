<script>

document.addEventListener("DOMContentLoaded", function() {
  // Select all radio button wrappers
  const radioWrappers = document.querySelectorAll(".radio_btn-wrap");

  radioWrappers.forEach(wrapper => {
    // Check initially
    toggleTextColor(wrapper);

    // If the class changes dynamically (e.g., click), observe it
    const observer = new MutationObserver(() => toggleTextColor(wrapper));
    observer.observe(wrapper, { attributes: true, attributeFilter: ["class"] });
  });

  function toggleTextColor(wrapper) {
    const filterText = wrapper.querySelector(".is-filter_text");
    if (filterText) {
      if (wrapper.classList.contains("is-active")) {
        filterText.style.color = "white";
      } else {
        filterText.style.color = ""; // reset to default
      }
    }
  }
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const elements = document.querySelectorAll(".radio_btn-wrap");

  // Function to update shadow
  function updateShadow(el) {
    if (el.classList.contains("is-active")) {
      el.style.boxShadow =
        "inset 2px 2px 4px rgba(0, 0, 0, 0.08), " +  /* 1st */
        "inset -2px -2px 4px rgba(255, 255, 255, 0.25), " + /* 2nd */
        "inset -4px -4px 12px rgba(255, 255, 255, 0.25)";  /* 3rd */

      el.style.backgroundColor = "#fd5b0e";
    } else {
      el.style.boxShadow = ""; 
      el.style.backgroundColor = "rgba(255, 82, 0, 0.05)";
    }
  }

  // Initial check and observer setup
  elements.forEach(el => {
    updateShadow(el);

    // Watch for class changes
    const observer = new MutationObserver(() => updateShadow(el));
    observer.observe(el, {
      attributes: true,
      attributeFilter: ["class"]
    });
  });
});
</script>
